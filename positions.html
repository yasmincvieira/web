<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{border: 1px solid deeppink; margin: 0px; padding: 0px;}
        #container{position: relative;}
        .box{
            display: inline-block;
            width: 100px;
            height: 100px;
            border-color: cadetblue;
        }
        #box1{
            background-color: pink;
            position: relative; /** Relativo em relação a posição estática dele */
            top: 100px;
            left: 150px;
        }
        #box2{background-color: lightblue;
            position: static;
            top: 100px;
        }
        #box3{background-color: pink;
            position: absolute; /** Se posiociona em relação ao primeiro ancestral não estático */
            top: 5px;
            left: 5px;
        }
        #box4{background-color: lightblue;
            position: fixed;
            bottom: 0px;
            right: 0px;
        }
        #box5{background-color: pink;}
        span:last-child{background-color: lightblue;}
        
    </style>
    <title>Document</title>
</head>
<body>
    <div style="height: 100px;">

    </div>
    <div id="container">
        <div id="box1" class="box">1</div>
        <div id="box2" class="box">2</div>
        <div id="box3" class="box">3</div>
        <div id="box4" class="box">4</div>
        <div id="box5" class="box">5</div>
        <span class="box">6</span>
    </div>

    


</body>
</html>
