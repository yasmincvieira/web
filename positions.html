<!DOCTYPE html>
<html lang="en">
<head>
    <title>Positions</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{border: 1px solid deeppink; margin: 0px; padding: 0px;}
        .container{position: relative;}
        .box{
            display: inline-block;
            width: 100px;
            height: 100px;
            border-color: cadetblue;
        }
        #box1{background-color: red;
            position: relative;
            top: 300px;
            
        }
        #box2{background-color: orange;
            position: absolute; /*-- Ele cria uma camada adicional de execução e se move com referência ao primeiro ancestral não estático--*/
            top: 300px;
            
        }
        #box3{background-color: yellow;
            position: fixed;
            top: 0px;
            right: 0px;
            
        }
        #box4{background-color: lawngreen;
            
        }
        #box5{background-color: blue;}
        span:last-child{background-color: purple;}
        
    </style>
    <title>Document</title>
</head>
<body>
    <div style="height: 100px;" class="container">

    </div>
    <div class="container">
        <div id="box1" class="box">1</div>
        <div id="box2" class="box">2</div>
        <div id="box3" class="box">3</div>
        <div id="box4" class="box">4</div>
        <div id="box5" class="box">5</div>
        <span class="box">6</span>
    </div>

    


</body>
</html>
