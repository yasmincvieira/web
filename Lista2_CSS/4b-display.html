<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*reset css*/
        *{margin: 0px; padding: 0px;}
        body{min-height: 100vh;}
        .box{border: 1px solid black;
            box-sizing: border-box;
            text-align: center;
            line-height: 25vh;
            height: 25vh;
            width: 25vw;
            display: inline-block;
        }
        #box1{background-color: blue;}
        #box2{background-color: green;}
        #box3{background-color: red;}
        #box4{background-color: yellow;}
    </style>
</head>
<body>
    <!-- div#box$.box*4{$} -->
    <div id="box1" class="box">1</div><div id="box2" class="box">2</div><div id="box3" class="box">3</div><div id="box4" class="box">4</div>
</body>
</html>
