<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barquinho</title>
    <style>
        body{background: radial-gradient(circle, white, lightblue) ;}

        .mar{background-color: #51A4FD;
            width: 100%;
            border: 100px solid #51A4FD;
            position: fixed;
            bottom: 0px;
            left: 0px;
        }
        #barco{
            display: inline-block;
            font-size: 100px;
            position: fixed;
            bottom: 130px;
            left: 0px;
            z-index: 1;
            animation: barquinho 7s linear 0s infinite, flutuar 3s linear 0s infinite;
        }
        .nuvem{
            display: inline-block;
            font-size: 90px;
            position: fixed;
            left: 0px;
            top: 80px;
        }
        #n1{animation: nuvem1 10s linear 0s infinite;}
        #n2{animation: nuvem2 20s linear 0s infinite;}

        @keyframes barquinho {
            0%{left: -200px;}
            100%{left: 1300px;}
        }
        @keyframes flutuar {
            0%{transform: rotate(0deg);}
            25%{transform: rotate(5deg);}
            50%{transform: rotate(0deg);}
            75%{transform: rotate(-5deg);}
            100%{transform: rotate(0deg);}
        }
        @keyframes nuvem1 {
            0%{left: -300px;}
            100%{left: 1300px;}
        }
        @keyframes nuvem2 {
            0%{left: -600px;}
            100%{left: 1600px;}
        }

    </style>
</head>
<body>
    <div id="barco"><span>⛵</span></div>
    <div class="mar"></div>
    <div class="nuvem" id="n1"><span>☁️</span></div>
    <div class="nuvem" id="n2"><span>☁️</span></div>
    
</body>
</html>
