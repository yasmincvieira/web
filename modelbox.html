<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModelBox</title>
    <style>
        .box{
            width: 200px;
            height: 200px;
            background-color: pink;
            background-image: url(img/gatinho.jpg);
            background-size: 80px;
            background-repeat: no-repeat;
            background-position: 50% 50%;

            border-top-color: deeppink;
            border-top-width: 10px;
            border-top-style: solid;

            border-top: 10px solid cadetblue;
            border-left: 10px solid royalblue;
            border-right: 10px solid deeppink;
            border-bottom: 10px solid rebeccapurple;
            border-radius: 10% 20% 30% 50%;

            margin: 20px;
            outline: 5px dotted pink;
            outline-offset: 5px;

        }

    </style>

</head>
<body>
    <div class="box">box</div>
    <div class="box">box</div>
    
</body>
</html>
